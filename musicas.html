<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nossas Músicas ❤️</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⭐</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0a1628 0%, #0d2137 30%, #0a2e1f 70%, #0d1f15 100%);
      padding: 40px 20px;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.4), transparent),
        radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.3), transparent),
        radial-gradient(1.5px 1.5px at 50% 10%, rgba(255,255,255,0.5), transparent),
        radial-gradient(1px 1px at 70% 40%, rgba(255,255,255,0.3), transparent),
        radial-gradient(1px 1px at 90% 80%, rgba(255,255,255,0.4), transparent);
      pointer-events: none;
      z-index: 0;
      animation: twinkle 4s ease-in-out infinite alternate;
    }
    @keyframes twinkle { 0% { opacity: 0.6; } 100% { opacity: 1; } }

    .container { position: relative; z-index: 1; max-width: 600px; margin: 0 auto; }

    .page-title {
      text-align: center;
      font-family: 'Dancing Script', cursive;
      color: #4ecdc4;
      font-size: 2.8rem;
      margin-bottom: 15px;
      text-shadow: 0 0 30px rgba(78, 205, 196, 0.3);
      opacity: 0;
      animation: fadeDown 1s ease forwards;
    }

    .page-subtitle {
      text-align: center;
      font-family: 'Lora', serif;
      color: rgba(200, 219, 230, 0.6);
      font-size: 1rem;
      margin-bottom: 40px;
      font-style: italic;
      opacity: 0;
      animation: fadeDown 1s ease forwards 0.3s;
    }

    @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

    .music-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 35px;
    }

    .music-card {
      display: flex;
      align-items: center;
      gap: 18px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(78, 205, 196, 0.15);
      border-radius: 16px;
      padding: 14px 18px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
      opacity: 0;
      animation: cardAppear 0.6s ease forwards;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: default;
    }

    .music-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(78, 205, 196, 0.1), 0 8px 30px rgba(0, 0, 0, 0.3);
    }

    .music-card:nth-child(1) { animation-delay: 0.2s; }
    .music-card:nth-child(2) { animation-delay: 0.35s; }
    .music-card:nth-child(3) { animation-delay: 0.5s; }
    .music-card:nth-child(4) { animation-delay: 0.65s; }
    .music-card:nth-child(5) { animation-delay: 0.8s; }
    .music-card:nth-child(6) { animation-delay: 0.95s; }

    @keyframes cardAppear { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .music-cover {
      width: 70px;
      height: 70px;
      border-radius: 10px;
      overflow: hidden;
      flex-shrink: 0;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }

    .music-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .music-cover .cover-placeholder {
      width: 100%;
      height: 100%;
      background: rgba(78, 205, 196, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
    }

    .music-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .music-name {
      font-family: 'Lora', serif;
      color: #c8dbe6;
      font-size: 1.05rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .music-artist {
      font-family: 'Lora', serif;
      color: rgba(200, 219, 230, 0.5);
      font-size: 0.85rem;
    }

    .music-number {
      font-family: 'Dancing Script', cursive;
      color: rgba(78, 205, 196, 0.4);
      font-size: 1.3rem;
      flex-shrink: 0;
      width: 25px;
      text-align: center;
    }

    .back-btn {
      display: block;
      margin: 0 auto;
      background: rgba(78, 205, 196, 0.15);
      border: 1px solid rgba(78, 205, 196, 0.3);
      color: #4ecdc4;
      font-family: 'Lora', serif;
      font-size: 1.1rem;
      padding: 14px 40px;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      text-align: center;
      width: fit-content;
    }
    .back-btn:hover { background: rgba(78, 205, 196, 0.25); transform: translateY(-2px); }

    .glow-left, .glow-right { position: fixed; width: 300px; height: 300px; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; }
    .glow-left { top: 20%; left: -100px; background: rgba(30, 80, 130, 0.25); animation: float 8s ease-in-out infinite; }
    .glow-right { bottom: 20%; right: -100px; background: rgba(30, 130, 80, 0.2); animation: float 8s ease-in-out infinite reverse; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-30px); } }

    @media (max-width: 480px) {
      .page-title { font-size: 2rem; }
      .music-cover { width: 55px; height: 55px; }
      .music-name { font-size: 0.95rem; }
    }
  </style>
</head>
<body>
  <div class="glow-left"></div>
  <div class="glow-right"></div>

  <div class="container">
    <h1 class="page-title">Suas Músicas Favoritas 🎵</h1>
    <p class="page-subtitle">as que você mais gosta, meu amor</p>

    <div class="music-list">

      <div class="music-card">

        </div>
        <div class="music-info">
          <span class="music-name">Nome da Música</span>

        </div>
      </div>

      <div class="music-card">
        <span class="music-number">3</span>
        <div class="music-cover">
          <div class="cover-placeholder">🎵</div>
        </div>
        <div class="music-info">
          <span class="music-name">Nome da Música</span>
          <span class="music-artist">Nome do Artista</span>
        </div>
      </div>

      <div class="music-card">
        <span class="music-number">4</span>
        <div class="music-cover">
          <div class="cover-placeholder">🎵</div>
        </div>
        <div class="music-info">
          <span class="music-name">Nome da Música</span>
          <span class="music-artist">Nome do Artista</span>
        </div>
      </div>

      <div class="music-card">
        <span class="music-number">5</span>
        <div class="music-cover">
          <div class="cover-placeholder">🎵</div>
        </div>
        <div class="music-info">
          <span class="music-name">Nome da Música</span>
          <span class="music-artist">Nome do Artista</span>
        </div>
      </div>

      <div class="music-card">
        <span class="music-number">6</span>
        <div class="music-cover">
          <div class="cover-placeholder">🎵</div>
        </div>
        <div class="music-info">
          <span class="music-name">Nome da Música</span>

        </div>
      </div>

    </div>

    <a href="index.html" class="back-btn">← Voltar ao poema</a>
  </div>

</html>
