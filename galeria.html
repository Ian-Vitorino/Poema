<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nossa Galeria ❤️</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⭐</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0a1628 0%, #0d2137 30%, #0a2e1f 70%, #0d1f15 100%);
      padding: 40px 20px;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.4), transparent),
        radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.3), transparent),
        radial-gradient(1.5px 1.5px at 50% 10%, rgba(255,255,255,0.5), transparent),
        radial-gradient(1px 1px at 70% 40%, rgba(255,255,255,0.3), transparent),
        radial-gradient(1px 1px at 90% 80%, rgba(255,255,255,0.4), transparent);
      pointer-events: none;
      z-index: 0;
      animation: twinkle 4s ease-in-out infinite alternate;
    }

    @keyframes twinkle {
      0% { opacity: 0.6; }
      100% { opacity: 1; }
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 800px;
      margin: 0 auto;
    }

    .gallery-title {
      text-align: center;
      font-family: 'Dancing Script', cursive;
      color: #4ecdc4;
      font-size: 2.8rem;
      margin-bottom: 40px;
      text-shadow: 0 0 30px rgba(78, 205, 196, 0.3);
      opacity: 0;
      animation: fadeDown 1s ease forwards;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .gallery-item {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      aspect-ratio: 1;
      border: 1px solid rgba(78, 205, 196, 0.15);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      opacity: 0;
      animation: itemAppear 0.6s ease forwards;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .gallery-item:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 15px 40px rgba(78, 205, 196, 0.15), 0 10px 30px rgba(0, 0, 0, 0.4);
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .gallery-item .placeholder {
      width: 100%;
      height: 100%;
      background: rgba(78, 205, 196, 0.05);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: rgba(78, 205, 196, 0.4);
      font-family: 'Lora', serif;
      font-size: 0.9rem;
      gap: 10px;
    }

    .gallery-item .placeholder span {
      font-size: 2.5rem;
    }

    @keyframes itemAppear {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .back-btn {
      display: block;
      margin: 0 auto;
      background: rgba(78, 205, 196, 0.15);
      border: 1px solid rgba(78, 205, 196, 0.3);
      color: #4ecdc4;
      font-family: 'Lora', serif;
      font-size: 1.1rem;
      padding: 14px 40px;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
    }

    .back-btn:hover {
      background: rgba(78, 205, 196, 0.25);
      transform: translateY(-2px);
    }

    /* Lightbox */
    .lightbox {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.9);
      z-index: 100;
      display: none;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }

    .lightbox.active {
      display: flex;
    }

    .lightbox img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 12px;
      box-shadow: 0 0 60px rgba(78, 205, 196, 0.1);
    }

    .glow-left, .glow-right {
      position: fixed;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }

    .glow-left {
      top: 20%;
      left: -100px;
      background: rgba(30, 80, 130, 0.25);
      animation: float 8s ease-in-out infinite;
    }

    .glow-right {
      bottom: 20%;
      right: -100px;
      background: rgba(30, 130, 80, 0.2);
      animation: float 8s ease-in-out infinite reverse;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-30px); }
    }

    .hidden-photo {
      text-align: center;
      margin-top: 30px;
    }

    .hidden-trigger {
      font-size: 1.5rem;
      cursor: pointer;
      opacity: 0.15;
      transition: opacity 0.3s ease;
      user-select: none;
    }

    .hidden-trigger:hover {
      opacity: 0.3;
    }

    .hidden-reveal {
      display: none;
      margin-top: 20px;
      align-items: center;
      justify-content: center;
      gap: 25px;
      flex-wrap: wrap;
    }

    .hidden-reveal.show {
      display: flex;
      animation: fadeDown 0.8s ease forwards;
    }

    .hidden-reveal img {
      max-width: 320px;
      width: 100%;
      border-radius: 16px;
      border: 1px solid rgba(78, 205, 196, 0.15);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      cursor: pointer;
    }

    .hidden-caption {
      font-family: 'Dancing Script', cursive;
      color: #4ecdc4;
      font-size: 1.4rem;
      text-shadow: 0 0 20px rgba(78, 205, 196, 0.3);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .hidden-caption .arrow {
      font-size: 1.8rem;
      animation: pointArrow 1s ease-in-out infinite;
    }

    @keyframes pointArrow {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(-10px); }
    }

    .bottom-message {
      text-align: center;
      font-family: 'Dancing Script', cursive;
      color: #4ecdc4;
      font-size: 1.6rem;
      margin-top: 35px;
      text-shadow: 0 0 20px rgba(78, 205, 196, 0.3);
      opacity: 0;
      animation: fadeDown 1s ease forwards 0.8s;
    }

    @media (max-width: 480px) {
      .gallery-title { font-size: 2rem; }
      .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
    }
  </style>
</head>
<body>
  <div class="glow-left"></div>
  <div class="glow-right"></div>

  <div class="container">
    <h1 class="gallery-title">Minha Princesinha 💕</h1>

    <div class="gallery-grid" id="gallery">
      <div class="gallery-item" style="animation-delay: 0.1s;">
        <img src="galeria/WhatsApp Image 2026-03-10 at 15.57.46.jpeg" alt="Nosso momento">
      </div>
      <div class="gallery-item" style="animation-delay: 0.2s;">
        <img src="galeria/WhatsApp Image 2026-03-10 at 15.57.47.jpeg" alt="Nosso momento">
      </div>
      <div class="gallery-item" style="animation-delay: 0.3s;">
        <img src="galeria/WhatsApp Image 2026-03-10 at 15.57.47 (1).jpeg" alt="Nosso momento">
      </div>
      <div class="gallery-item" style="animation-delay: 0.4s;">
        <img src="galeria/WhatsApp Image 2026-03-10 at 15.57.47 (2).jpeg" alt="Nosso momento">
      </div>
      <div class="gallery-item" style="animation-delay: 0.5s;">
        <img src="galeria/WhatsApp Image 2026-03-10 at 15.57.47 (3).jpeg" alt="Nosso momento">
      </div>
      <div class="gallery-item" style="animation-delay: 0.6s;">
        <img src="galeria/WhatsApp Image 2026-03-10 at 15.57.48.jpeg" alt="Nosso momento">
      </div>
    </div>

    <a href="index.html" class="back-btn">← Voltar ao poema</a>

    <p class="bottom-message">te amo tanto, fofinha ❤️</p>

    <div class="hidden-photo" id="hiddenPhoto">
      <div class="hidden-trigger">💕</div>
      <div class="hidden-reveal">
        <span class="hidden-caption">esse cara aqui te ama ó <span class="arrow">→</span></span>
        <img src="galeria/WhatsApp Image 2026-03-10 at 16.02.47 (1).jpeg" alt="Foto secreta">
      </div>
    </div>
  </div>

  <!-- Lightbox para ver foto ampliada -->
  <div class="lightbox" id="lightbox">
    <img src="" alt="Foto ampliada" id="lightboxImg">
  </div>

  <script>
    // Lightbox - clica na foto para ampliar
    document.querySelectorAll('.gallery-item img').forEach(img => {
      img.addEventListener('click', () => {
        const lightbox = document.getElementById('lightbox');
        document.getElementById('lightboxImg').src = img.src;
        lightbox.classList.add('active');
      });
    });

    document.getElementById('lightbox').addEventListener('click', () => {
      document.getElementById('lightbox').classList.remove('active');
    });

    // Foto oculta
    document.querySelector('.hidden-trigger').addEventListener('click', () => {
      const reveal = document.querySelector('.hidden-reveal');
      reveal.classList.toggle('show');
    });

    // Lightbox para foto oculta também
    const hiddenImg = document.querySelector('.hidden-reveal img');
    if (hiddenImg) {
      hiddenImg.addEventListener('click', () => {
        const lightbox = document.getElementById('lightbox');
        document.getElementById('lightboxImg').src = hiddenImg.src;
        lightbox.classList.add('active');
      });
    }
  </script>
</body>
</html>
